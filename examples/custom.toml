# A customized deck: what a personal layout looks like beyond the
# shipped default. Demonstrates what user layouts reach for — personal
# slash commands (/goal, /radio), an insert tile (GOAL lands "/goal "
# unexecuted, ready for its argument), a label override (RELOAD), and
# wide span-4 buttons where the default went span-2. Point
# @gearshifter-layout at a copy of this file and edit away.
#
# No output-style gear: Claude Code dropped /output-style, and /config
# outputStyle= rejects custom styles non-interactively — no injectable
# path exists (DECK-CONTENT.md postscript).
#
# Needs ~22 popup rows (two-gear rail); bump @gearshifter-height if
# the deck reports the canvas too small.

[[tile]]
type    = "gear"
command = "model"
values  = ["haiku", "sonnet", "opus", "fable"]
col     = 0
span    = 5

[[tile]]
type    = "gear"
command = "effort"
values  = ["low", "medium", "high", "max"]
col     = 0
span    = 5

[[tile]]
type    = "button"
command = "compact"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "copy"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "clear"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "context"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "goal"
insert  = true
glyph   = "⌾" # compact-strip chip glyph; personal commands would otherwise all show "•"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "radio"
glyph   = "♫"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "reload-plugins"
label   = "RELOAD"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "resume"
col     = 9
span    = 4

[[tile]]
type = "launcher"
