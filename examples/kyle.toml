# Kyle's daily deck (data-driven, DECK-CONTENT.md 2026-07-05): the
# default's gears + a STYLE gear (personal output styles, live-marked
# from settings.json), the generic button 6-pack minus CONFIG/RESUME,
# plus GOAL (insert — always takes a condition), RADIO, and the
# plugin-dev loop. Pointed at by @gearshifter-layout in
# dotfiles/tmux/.tmux.conf.local.
#
# Needs ~28 popup rows (three-gear rail); bump @gearshifter-height if
# the deck reports the canvas too small.

[[tile]]
type    = "gear"
command = "model"
values  = ["haiku", "sonnet", "opus", "fable"]
col     = 0
span    = 5

[[tile]]
type    = "gear"
command = "effort"
values  = ["low", "medium", "high", "max"]
col     = 0
span    = 5

[[tile]]
type    = "gear"
command = "output-style"
label   = "STYLE"
values  = ["butterfield", "linus-torvalds", "mayo-clinic", "readable-markdown"]
col     = 0
span    = 5

[[tile]]
type    = "button"
command = "compact"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "copy"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "clear"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "context"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "goal"
insert  = true
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "radio"
col     = 9
span    = 4

[[tile]]
type    = "button"
command = "reload-plugins"
label   = "RELOAD"
col     = 5
span    = 4

[[tile]]
type    = "button"
command = "resume"
col     = 9
span    = 4

[[tile]]
type = "launcher"
